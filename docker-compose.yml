services:
  app:
    build:
      context: .
    ports:
      - "${APP_PORT:-8000}:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: first_decision
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d first_decision"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  app_storage:
